<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced To Do List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Auth Section -->
    <div class="auth-container" id="authContainer">
        <div class="auth-box">
            <h1><i class="fas fa-tasks"></i> Task Master</h1>

            <!-- Register Tab -->
            <div class="auth-form register-form" id="registerForm">
                <h2>Create Account</h2>
                <input type="text" id="regUsername" placeholder="Username" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPassword" placeholder="Password" required>
                <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required>
                <button onclick="registerUser()">Register</button>
                <p>Already have an account? <span onclick="switchTab('login')" class="switch-link">Login</span></p>
            </div>

            <!-- Login Tab -->
            <div class="auth-form login-form active" id="loginForm">
                <h2>Welcome Back</h2>
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button onclick="loginUser()">Login</button>
                <p>Don't have an account? <span onclick="switchTab('register')" class="switch-link">Register</span></p>
                <button class="demo-btn" onclick="demoLogin()">Try Demo</button>
            </div>
        </div>
    </div>

    <!-- Main App Section -->
    <div class="app-container hidden" id="appContainer">
        <!-- Header -->
        <header>
            <div class="header-container">
                <div class="header-left">
                    <h1><i class="fas fa-tasks"></i> Task Master</h1>
                </div>
                <div class="header-right">
                    <button class="theme-toggle" onclick="toggleDarkMode()" title="Toggle Dark Mode">
                        <i class="fas fa-moon"></i>
                    </button>
                    <div class="user-info">
                        <span id="currentUser"></span>
                        <button onclick="logoutUser()" class="logout-btn">Logout</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Stats Section -->
        <section class="stats-section">
            <div class="stat-card">
                <i class="fas fa-tasks"></i>
                <div>
                    <span class="stat-label">Total Tasks</span>
                    <span class="stat-value" id="totalTasks">0</span>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-circle"></i>
                <div>
                    <span class="stat-label">Completed</span>
                    <span class="stat-value" id="completedTasks">0</span>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-clock"></i>
                <div>
                    <span class="stat-label">Pending</span>
                    <span class="stat-value" id="pendingTasks">0</span>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-percentage"></i>
                <div>
                    <span class="stat-label">Completion</span>
                    <span class="stat-value" id="completionRate">0%</span>
                </div>
            </div>
        </section>

        <!-- Main Todo Section -->
        <main class="todo-container">
            <!-- Sidebar -->
            <aside class="sidebar">
                <h3>Filters</h3>
                <button class="filter-btn active" onclick="filterTasks('all')">
                    <i class="fas fa-list"></i> All Tasks
                </button>
                <button class="filter-btn" onclick="filterTasks('pending')">
                    <i class="fas fa-hourglass-half"></i> Pending
                </button>
                <button class="filter-btn" onclick="filterTasks('completed')">
                    <i class="fas fa-check"></i> Completed
                </button>
                <button class="filter-btn" onclick="filterTasks('today')">
                    <i class="fas fa-calendar-day"></i> Today
                </button>
                <button class="filter-btn" onclick="filterTasks('high')">
                    <i class="fas fa-exclamation-circle"></i> High Priority
                </button>

                <h3 class="category-heading">Categories</h3>
                <div id="categoryList" class="category-list"></div>
            </aside>

            <!-- Main Content -->
            <section class="main-content">
                <!-- Add Task Form -->
                <div class="add-task-section">
                    <h2>Add New Task</h2>
                    <div class="task-form">
                        <input type="text" id="taskInput" placeholder="What needs to be done?"
                            onkeypress="if(event.key==='Enter') addTask()">
                        <label for="categorySelect">Category:</label>
                        <select id="categorySelect">
                            <option value="General">General</option>
                            <option value="Work">Work</option>
                            <option value="Personal">Personal</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Health">Health</option>
                            <option value="Education">Education</option>
                        </select>
                        <label for="prioritySelect">Priority:</label>
                        <select id="prioritySelect">
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                            <option value="Low">Low</option>
                        </select>
                        <label for="dueDateInput">Due Date:</label>
                        <input type="date" id="dueDateInput">
                        <button onclick="addTask()" class="add-btn">
                            <i class="fas fa-plus"></i> Add Task
                        </button>
                    </div>
                </div>

                <!-- Search Section -->
                <div class="search-section">
                    <input type="text" id="searchInput" placeholder="🔍 Search tasks..." onkeyup="searchTasks()">
                    <button onclick="sortTasks()" class="sort-btn">
                        <i class="fas fa-sort"></i> Sort
                    </button>
                </div>

                <!-- Task List -->
                <div class="task-list-container">
                    <ul id="taskList" class="task-list"></ul>
                    <div class="empty-state hidden" id="emptyState">
                        <i class="fas fa-inbox"></i>
                        <p>No tasks yet. Add one to get started!</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
